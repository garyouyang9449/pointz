name: Deploy server

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: pointz-server
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            ./server

      # Migrations are intentionally a separate SSM command — not folded into
      # the systemd ExecStartPre — so a failed migration stops the deploy
      # BEFORE we restart the live container onto a schema it can't talk to.
      # Drizzle records applied migrations in a `__drizzle_migrations` table,
      # so re-runs are idempotent when nothing is pending.
      - name: Run pending migrations on EC2 via SSM
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          # Use a heredoc'd JSON file so we can ship a multi-line script
          # cleanly without quoting hell in --parameters.
          cat > /tmp/migrate-params.json <<EOF
          {
            "commands": [
              "set -euxo pipefail",
              "cd /opt/pointz",
              "/opt/pointz/render-env.sh",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              "docker compose pull api",
              "docker compose run --rm --no-deps api node dist/lib/migrate.js"
            ]
          }
          EOF
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Pointz migrate ${{ github.sha }}" \
            --parameters file:///tmp/migrate-params.json \
            --query "Command.CommandId" --output text)
          echo "Command: $CMD_ID"
          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut)
                echo "--- migrate stdout ---"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query "StandardOutputContent" --output text || true
                echo "--- migrate stderr ---"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text || true
                exit 1
                ;;
            esac
            sleep 5
            if [ $i -eq 60 ]; then
              echo "Timed out waiting for migration SSM command"
              exit 1
            fi
          done

      - name: Trigger redeploy on EC2 via SSM
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Pointz server redeploy ${{ github.sha }}" \
            --parameters commands='["systemctl restart pointz.service"]' \
            --query "Command.CommandId" --output text)
          echo "Command: $CMD_ID"
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut) exit 1 ;;
            esac
            sleep 5
          done
          echo "Timed out waiting for SSM command"
          exit 1
