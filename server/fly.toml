app = "pointz-server"
primary_region = "iad"

[build]

[deploy]
  release_command = "sh -c 'node dist/lib/migrate.js && node dist/lib/seed.js'"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
