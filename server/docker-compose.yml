services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pointz
      POSTGRES_PASSWORD: pointz
      POSTGRES_DB: pointz
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pointz -d pointz"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://pointz:pointz@postgres:5432/pointz
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
